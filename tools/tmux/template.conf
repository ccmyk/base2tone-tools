# Base2Tone visual configuration for tmux.
#
# This module owns all color-bearing native options and status content.
# The source uses direct Base2Tone coordinates. Generated output contains
# literal hexadecimal colors and no runtime palette-variable layer.

# Status
set -g status-style \
  "bg=#{{A0}}"

# Status left
set -g status-left ""

set -ga status-left \
  "#{?client_prefix,#{#[bg=#{{D0}},      fg=#{{A0}},      bold] tmux #S },#{#[bg=#{{A0}},      fg=#{{D4}}] tmux #S }}"

set -ga status-left \
  "#[bg=#{{A0}},      fg=#{{A2}},      none]│"

set -ga status-left \
  "#[bg=#{{A0}},      fg=#{{B4}}] #{=/-32/...:#{s|$HOME|~|:#{b:pane_current_path}}} "

set -ga status-left \
  "#[bg=#{{A0}},      fg=#{{A2}},      none]#{?window_zoomed_flag,│,}"

set -ga status-left \
  "#[bg=#{{A0}},      fg=#{{D6}}]#{?window_zoomed_flag, zoom ,}"

# Status right
set -g status-right ""

set -ga status-right \
  "#[bg=#{{A0}},      fg=#{{A2}},      none]│"

set -ga status-right \
  "#[bg=#{{A0}},      fg=#{{B4}}] %Y-%m-%d %H:%M "

# Window list
set -g window-status-format \
  " #I#{?#{!=:#{window_name},Window},: #W,} "

set -g window-status-current-format \
  " #I#{?#{!=:#{window_name},Window},: #W,} "

set -gF window-status-separator \
  "#[bg=#{{A0}},      fg=#{{A2}}]│"

set -g window-status-style \
  "bg=#{{A0}},      fg=#{{A3}}"

set -g window-status-last-style \
  "bg=#{{A0}},      fg=#{{A6}}"

set -g window-status-activity-style \
  "bg=#{{B2}},      fg=#{{A0}}"

set -g window-status-bell-style \
  "bg=#{{B2}},      fg=#{{A0}},      bold"

set -g window-status-current-style \
  "bg=#{{D0}},      fg=#{{A0}},      bold"

# Messages and copy mode
set -g message-style \
  "bg=#{{A0}},      fg=#{{A6}}"

set -g message-command-style \
  "bg=#{{A0}},      fg=#{{D0}}"

set -g mode-style \
  "bg=#{{D0}},      fg=#{{A0}},      bold"

# Panes
set -g pane-border-style \
  "fg=#{{A2}}"

set -g pane-active-border-style \
  "fg=#{{D0}}"

set -g display-panes-colour \
  "#{{A5}}"

set -g display-panes-active-colour \
  "#{{D5}}"

# Menus
set -g menu-style \
  "bg=#{{A0}},      fg=#{{A6}}"

set -g menu-selected-style \
  "bg=#{{D0}},      fg=#{{A0}},      bold"

set -g menu-border-style \
  "fg=#{{A2}}"

# Popups
set -g popup-style \
  "bg=#{{A0}},      fg=#{{A6}}"

set -g popup-border-style \
  "fg=#{{D0}}"

# Clock
set -g clock-mode-colour \
  "#{{D5}}"
