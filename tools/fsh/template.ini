; Generated Base2Tone theme for fast-syntax-highlighting.
;
; Every field maps directly to an original Base2Tone coordinate.
; A coordinate assignment here is local to shell syntax highlighting and does
; not establish a global semantic meaning for that coordinate.
;
; Fast Syntax Highlighting accepts foreground colors as #RRGGBB and background
; colors as bg:#RRGGBB.

[base]
default                             = none

; Invalid input must remain conspicuous.
unknown-token                       = #{{B2}},bold

; Shell structure remains visible without dominating commands and arguments.
commandseparator                    = #{{A5}}
redirection                         = #{{C4}}

; Here-string delimiters and interpolated values use the stronger D family.
here-string-tri                     = #{{D4}}
here-string-text                    = bg:#{{A1}}
here-string-var                     = #{{D5}},bg:#{{A1}}

exec-descriptor                     = #{{D4}},bold

; Comments are intentionally quiet.
comment                             = #{{A3}}

; Subtle correctness indicators use restrained structural backgrounds.
correct-subtle                      = bg:#{{A1}}
incorrect-subtle                    = bg:#{{B0}}
subtle-separator                    = #{{A4}}
subtle-bg                           = bg:#{{A1}}

; Recursive highlighting remains readable without introducing another theme.
recursive-base                      = #{{A6}}

[command-point]
; Reserved shell words use the alternate chromatic family.
reserved-word                       = #{{D4}},bold
subcommand                          = #{{D5}}

; Aliases and ordinary commands remain in the B family.
alias                               = #{{B5}}
suffix-alias                        = #{{B4}}
global-alias                        = #{{B4}},bold
builtin                             = #{{B4}}
function                            = #{{C5}}
command                             = #{{B5}},bold
precommand                          = #{{D4}}
hashed-command                      = #{{B5}}

; Test expressions and arithmetic command forms retain related distinctions.
single-sq-bracket                   = #{{C4}}
double-sq-bracket                   = #{{C5}}
double-paren                        = #{{D4}}

[paths]
; Paths receive a strong navigation color distinct from shell commands.
path                                = #{{D4}}
pathseparator                       = #{{A4}}
path-to-dir                         = #{{D5}},underline

; Globs use the lighter C ramp.
globbing                            = #{{C4}}
globbing-ext                        = #{{C5}},bold

[brackets]
; Matched brackets receive a quiet structural background.
paired-bracket                      = bg:#{{A2}}

; Nested levels deliberately rotate through both chromatic families.
bracket-level-1                     = #{{B4}},bold
bracket-level-2                     = #{{C4}},bold
bracket-level-3                     = #{{D4}},bold

[arguments]
; Options use adjacent D stops so single- and double-hyphen forms differ.
single-hyphen-option                = #{{D4}}
double-hyphen-option                = #{{D5}}

back-quoted-argument                = #{{A6}}

; Quoted strings remain within one B-family progression.
single-quoted-argument              = #{{B4}}
double-quoted-argument              = #{{B5}}
dollar-quoted-argument              = #{{B6}}

[in-string]
; Escapes and interpolation must remain visible inside quoted strings.
back-dollar-quoted-argument         = #{{D4}}
back-or-dollar-double-quoted-argument = #{{D5}}

[other]
; Variables use the readable C family while assignments remain quieter.
variable                            = #{{C5}}
assign                              = #{{A5}}
assign-array-bracket                = #{{C4}}

history-expansion                   = #{{D6}},bold

[math]
mathvar                             = #{{C5}}
mathnum                             = #{{D4}}
matherr                             = #{{B2}},bold

[for-loop]
forvar                              = #{{C5}}
fornum                              = #{{D4}}
foroper                             = #{{A5}}
forsep                              = #{{A4}}

[case]
case-input                          = #{{C5}}
case-parentheses                    = #{{D4}}
case-condition                      = bg:#{{A1}}
