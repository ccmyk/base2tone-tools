# Generated from an upstream Base2Tone scheme.
#
# This template intentionally uses the original Base2Tone coordinates directly.
# There is no intermediate semantic color dictionary.
#
# General mapping strategy:
#
#   A0..A2  structural dark values
#   A3..A5  metadata and lower-priority columns
#   A6..A7  ordinary readable foregrounds
#   B bank   paths, links, classifications, and alternate distinctions
#   C bank   strongest readable text
#   D bank   executable, changed, and emphasized distinctions
#
# B and D are chromatic families, not universal semantic categories.
# Their hues vary significantly between Base2Tone schemes.

colourful: true

filekinds:
  # Ordinary files should remain readable but quieter than directories.
  normal:       { foreground: "#{{A6}}" }

  # Directories and links are navigation objects. Nearby B stops distinguish
  # them while keeping them in the same chromatic family.
  directory:    { foreground: "#{{B4}}", is_bold: true }
  symlink:      { foreground: "#{{B5}}", is_italic: true }
  mount_point:  { foreground: "#{{B6}}", is_bold: true }

  # Executables use the alternate chromatic bank so they remain visibly
  # distinct from directories in schemes where B and D are far apart.
  executable:   { foreground: "#{{D4}}", is_bold: true }

  # Pipes and sockets are uncommon filesystem objects, but should not dominate.
  pipe:         { foreground: "#{{A4}}" }
  socket:       { foreground: "#{{A5}}" }

  # Device and special-file distinctions use lower chromatic stops.
  block_device: { foreground: "#{{D2}}" }
  char_device:  { foreground: "#{{D3}}" }
  special:      { foreground: "#{{B3}}" }

perms:
  # Read permissions form a quiet A-bank progression.
  user_read:         { foreground: "#{{A6}}" }
  group_read:        { foreground: "#{{A5}}" }
  other_read:        { foreground: "#{{A4}}" }

  # Write permissions use one D stop consistently at every ownership level.
  user_write:        { foreground: "#{{D5}}" }
  group_write:       { foreground: "#{{D5}}" }
  other_write:       { foreground: "#{{D5}}" }

  # Execute permissions match the executable-file distinction.
  user_execute_file: { foreground: "#{{D4}}" }
  user_execute_other: { foreground: "#{{D4}}" }
  group_execute:     { foreground: "#{{D4}}" }
  other_execute:     { foreground: "#{{D4}}" }

  # Special permission bits need distinction without exceeding filenames.
  special_user_file: { foreground: "#{{B3}}" }
  special_other:     { foreground: "#{{B2}}" }
  attribute:         { foreground: "#{{A4}}" }

size:
  # Size magnitude stays within the A bank. This preserves an understandable
  # tonal progression even when B and D have very different hues or lightness.
  major:       { foreground: "#{{A5}}" }
  minor:       { foreground: "#{{A4}}" }

  number_byte: { foreground: "#{{A3}}" }
  number_kilo: { foreground: "#{{A4}}" }
  number_mega: { foreground: "#{{A5}}" }
  number_giga: { foreground: "#{{A6}}" }
  number_huge: { foreground: "#{{A7}}", is_bold: true }

  # Units stay quieter than their corresponding numbers.
  unit_byte:   { foreground: "#{{A3}}", is_dimmed: true }
  unit_kilo:   { foreground: "#{{A3}}" }
  unit_mega:   { foreground: "#{{A4}}" }
  unit_giga:   { foreground: "#{{A5}}" }
  unit_huge:   { foreground: "#{{A6}}" }

users:
  # The current user receives the strongest neutral foreground.
  user_you:    { foreground: "#{{C6}}" }
  group_yours: { foreground: "#{{A6}}" }

  # Other identities are metadata rather than primary content.
  user_other:  { foreground: "#{{A5}}" }
  group_other: { foreground: "#{{A4}}" }

  # Root must remain conspicuous without assuming that B means red.
  user_root:   { foreground: "#{{B2}}", is_bold: true }
  group_root:  { foreground: "#{{B2}}", is_bold: true }

links:
  normal:          { foreground: "#{{B5}}" }
  multi_link_file: { foreground: "#{{B6}}" }

git:
  # These are local eza assignments, not global meanings for B or D.
  new:        { foreground: "#{{D4}}" }
  modified:   { foreground: "#{{D6}}" }
  deleted:    { foreground: "#{{B2}}" }
  renamed:    { foreground: "#{{B4}}" }
  typechange: { foreground: "#{{B6}}" }
  ignored:    { foreground: "#{{A3}}", is_dimmed: true }
  conflicted: { foreground: "#{{B2}}", is_bold: true }

git_repo:
  branch_main:  { foreground: "#{{C6}}", is_bold: true }
  branch_other: { foreground: "#{{B5}}" }
  git_clean:    { foreground: "#{{D4}}" }
  git_dirty:    { foreground: "#{{D6}}" }

security_context:
  # Security-context output is metadata. The fields differ tonally so the
  # colon-separated components remain readable without becoming a color strip.
  colon: { foreground: "#{{A3}}" }
  user:  { foreground: "#{{A6}}" }
  role:  { foreground: "#{{B4}}" }
  typ:   { foreground: "#{{A5}}" }
  range: { foreground: "#{{B5}}" }

file_type:
  # File categories use related coordinates in the two chromatic banks.
  # They are classifications, not severity states.
  image:      { foreground: "#{{B4}}" }
  video:      { foreground: "#{{B5}}" }
  music:      { foreground: "#{{D4}}" }
  lossless:   { foreground: "#{{D5}}" }
  crypto:     { foreground: "#{{B2}}" }
  document:   { foreground: "#{{C6}}" }
  compressed: { foreground: "#{{B6}}" }
  temp:       { foreground: "#{{A3}}", is_dimmed: true }
  compiled:   { foreground: "#{{D3}}" }
  build:      { foreground: "#{{D2}}" }
  source:     { foreground: "#{{B4}}" }

# Miscellaneous long-list columns remain mostly neutral so filenames retain
# visual priority.
punctuation: { foreground: "#{{A3}}" }
date:        { foreground: "#{{A5}}" }
inode:       { foreground: "#{{A4}}" }
blocks:      { foreground: "#{{A4}}" }
header:      { foreground: "#{{C6}}", is_bold: true }
octal:       { foreground: "#{{B4}}" }
flags:       { foreground: "#{{B5}}" }

symlink_path:        { foreground: "#{{B5}}" }
control_char:        { foreground: "#{{D3}}" }
broken_symlink:      { foreground: "#{{B2}}", is_bold: true }
broken_path_overlay: { foreground: "#{{A3}}", is_dimmed: true }
